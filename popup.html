<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1B211D;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider {
      background: #177245;
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #5A655E;
      margin-bottom: 4px;
    }

    .field input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #D9DED9;
      border-radius: 6px;
      font-size: 13px;
    }

    .field input:focus {
      outline: none;
      border-color: #177245;
    }

    .field select {
      width: 100%;
      padding: 8px;
      border: 1px solid #D9DED9;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      color: #1B211D;
    }

    .field select:focus {
      outline: none;
      border-color: #177245;
    }

    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #177245;
      color: white;
    }

    .btn:hover { background: #125C38; }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #5A655E;
      text-align: center;
    }

    .status.saved { color: #177245; }
    .status.error { color: #BC3F30; }

    .key-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #5A655E;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    .dot.active { background: #177245; }
    .dot.missing { background: #BC3F30; }

    .divider {
      border: none;
      border-top: 1px solid #ECEEEA;
      margin: 16px 0;
    }

    .sites-section h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .site-list {
      list-style: none;
      margin-bottom: 8px;
    }

    .site-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }

    .site-list .built-in {
      color: #96A09A;
      font-size: 11px;
    }

    .site-list .remove-btn {
      background: none;
      border: none;
      color: #BC3F30;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }

    .site-list .remove-btn:hover { color: #93261B; }

    .add-site {
      display: flex;
      gap: 6px;
    }

    .add-site input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #D9DED9;
      border-radius: 6px;
      font-size: 12px;
    }

    .add-site input:focus {
      outline: none;
      border-color: #177245;
    }

    .add-site button {
      padding: 6px 12px;
      background: #177245;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .add-site button:hover { background: #125C38; }

    .strictness {
      margin-bottom: 12px;
    }

    .strictness label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #5A655E;
      margin-bottom: 6px;
    }

    .strictness-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .strictness-row input[type="range"] {
      flex: 1;
      accent-color: #177245;
    }

    .strictness-label {
      font-size: 12px;
      font-weight: 500;
      color: #177245;
      min-width: 50px;
    }

    .site-strictness {
      margin-bottom: 12px;
    }

    .site-strictness h3 {
      font-size: 11px;
      font-weight: 500;
      color: #96A09A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .site-strict-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .site-strict-row .site-name {
      width: 70px;
      color: #5A655E;
      flex-shrink: 0;
    }

    .site-strict-row input[type="range"] {
      flex: 1;
      accent-color: #177245;
    }

    .site-strict-row .site-strict-label {
      font-size: 11px;
      color: #177245;
      min-width: 50px;
      text-align: right;
    }
  
    /* ── Polish layer: ink-and-paper editorial system (2026-07 UI pass) ── */
    body { background: #F7F7F4; width: 320px; -webkit-font-smoothing: antialiased; }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .field label, .strictness label, .sites-section h2, .telemetry-section h2, .site-strictness h3 {
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.09em; color: #96A09A;
    }
    .field input[type="password"], .field select, .add-site input {
      background: #fff; border-color: #D9DED9; border-radius: 8px;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field select:focus, .add-site input:focus {
      border-color: #177245; box-shadow: 0 0 0 3px rgba(23,114,69,.12);
    }
    .btn, .add-site button { font-weight: 600; border-radius: 8px; }
    .btn { box-shadow: 0 1px 2px rgba(26,33,28,.08); }
    .strictness-label, .site-strict-row .site-strict-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    .key-status { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ToneGuard</h1>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="key-status" id="keyStatus">
    <span class="dot" id="keyDot"></span>
    <span id="keyLabel">Checking...</span>
  </div>

  <div id="quotaBanner" style="display:none; margin:8px 0; padding:10px 12px; border-radius:8px; background:#FAF3E3; border:1px solid #D9B45C; color:#6F5518; font-size:12px; line-height:1.4;">
    <strong>ToneGuard is paused</strong>
    <div id="quotaBannerMsg" style="margin:4px 0 8px;">Your API limit was reached, so messages are sending unchecked.</div>
    <button id="resumeBtn" class="btn" style="width:auto; padding:6px 12px; font-size:12px;">Resume ToneGuard</button>
  </div>

  <div class="field">
    <label for="apiKey">Claude API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-...">
  </div>

  <div class="strictness">
    <label>Strictness</label>
    <div class="strictness-row">
      <input type="range" id="strictness" min="1" max="3" value="2" step="1">
      <span class="strictness-label" id="strictnessLabel">Balanced</span>
    </div>
  </div>

  <div class="field">
    <label for="intentMode">Default rewrite mode</label>
    <select id="intentMode">
      <option value="professional">Professional</option>
      <option value="warm">Warm</option>
      <option value="direct">Direct</option>
      <option value="deescalating">De-escalating</option>
      <option value="boundary">Boundary</option>
      <option value="concise">Concise</option>
    </select>
  </div>

  <div class="field">
    <label for="voiceStrength">Voice preservation</label>
    <select id="voiceStrength">
      <option value="preserve">Preserve</option>
      <option value="balanced">Balanced</option>
      <option value="polish">Polish</option>
      <option value="rewrite">Rewrite</option>
    </select>
  </div>

  <div class="site-strictness" id="siteStrictness"></div>

  <button class="btn" id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <div class="sites-section">
    <h2>Active sites</h2>
    <ul class="site-list" id="siteList"></ul>
    <div class="add-site">
      <input type="text" id="newSite" placeholder="example.com">
      <button id="addSiteBtn">Add</button>
    </div>
  </div>

  <hr class="divider">

  <div class="telemetry-section">
    <h2>Telemetry</h2>
    <p class="telemetry-help">Local-only summary. No data leaves this device unless you copy it.</p>
    <button class="btn" id="copyTelemetryBtn">Copy summary</button>
    <div class="status" id="telemetryStatus"></div>
  </div>

  <script src="lib.js"></script>
  <script src="popup.js"></script>
</body>
</html>

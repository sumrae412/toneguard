name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install JS deps
        run: npm ci
      - name: Vitest
        run: node node_modules/.bin/vitest run
      - name: Shared artifacts freshness
        run: node scripts/generate_shared_artifacts.mjs --check
      - name: Parity scan (canonical + client drift)
        run: node scripts/parity_scan.mjs --check

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install MCP deps
        working-directory: toneguard-mcp
        run: |
          source $HOME/.local/bin/env
          uv sync --extra dev
      - name: MCP pytest
        working-directory: toneguard-mcp
        run: |
          source $HOME/.local/bin/env
          uv run --extra dev pytest tests/ -v --ignore=tests/test_live_integration.py

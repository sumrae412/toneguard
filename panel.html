<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <h1>ToneGuard</h1>
      <span class="badge" id="badge">Suggestion</span>
    </div>

    <div id="loading" class="loading">
      <div class="loading-dot"></div>
      <span>Reviewing your message...</span>
    </div>

    <div id="content" class="content" style="display: none;">
      <div class="reason" id="reasoning"></div>

      <div class="meta-row" id="metaRow" style="display: none;">
        <span class="readability" id="readability"></span>
        <span class="categories" id="categories"></span>
      </div>

      <div class="red-flags" id="redFlags" style="display: none;">
        <div class="section-label">Flagged phrases</div>
        <div class="flags-list" id="flagsList"></div>
      </div>

      <div class="section">
        <div class="section-label">Your message</div>
        <div class="message-box original" id="original"></div>
      </div>

      <div class="questions-section" id="questionsSection" style="display: none;">
        <div class="section-label">Help me improve this</div>
        <div id="questionsList"></div>
        <button class="btn btn-primary" id="submitAnswers">Refine with my answers</button>
      </div>

      <div id="refiningIndicator" class="loading" style="display: none;">
        <div class="loading-dot"></div>
        <span>Refining with your answers...</span>
      </div>

      <div class="section">
        <div class="section-label">Suggested rewrite <span class="edit-hint">(click to edit)</span></div>
        <div class="message-box suggestion" id="suggestion" contenteditable="true"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="useSuggestion">Use suggestion <span class="kbd">Enter</span></button>
        <button class="btn btn-secondary" id="sendOriginal">Send as-is <span class="kbd">Esc</span></button>
      </div>
    </div>

    <div id="empty" class="empty">
      <p>ToneGuard is active. It'll appear here when it catches something.</p>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>

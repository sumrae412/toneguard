<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <h1>ToneGuard</h1>
      <span class="badge" id="badge">Suggestion</span>
    </div>

    <div id="loading" class="loading">
      <div class="loading-dot"></div>
      <span>Reviewing your message...</span>
    </div>

    <div id="content" class="content" style="display: none;">
      <div class="reason" id="reasoning"></div>

      <div class="section">
        <div class="section-label">Your message</div>
        <div class="message-box original" id="original"></div>
      </div>

      <div class="section">
        <div class="section-label">Suggested rewrite</div>
        <div class="message-box suggestion" id="suggestion"></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="useSuggestion">Use suggestion</button>
        <button class="btn btn-secondary" id="sendOriginal">Send as-is</button>
      </div>
    </div>

    <div id="empty" class="empty">
      <p>ToneGuard is active. It'll appear here when it catches something.</p>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
